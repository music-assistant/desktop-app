id: io.music_assistant.Companion
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: music-assistant-companion

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

finish-args:
  # WebView/windowing. The app currently forces GDK_BACKEND=x11 before GTK init
  # to avoid tray issues on GNOME/Wayland, so x11 is required for now.
  - --socket=x11
  - --share=ipc
  - --device=dri

  # Music Assistant server access, Sendspin WebSocket audio, and mDNS.
  - --share=network

  # Native audio playback via CPAL/PulseAudio.
  - --socket=pulseaudio

  # System tray / StatusNotifier integration.
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create

  # MPRIS media controls. Flatpak permits org.mpris.MediaPlayer2.$FLATPAK_ID by
  # default, but the existing Linux backend owns org.mpris.MediaPlayer2.music_assistant.*.
  - --own-name=org.mpris.MediaPlayer2.music_assistant.*

  # Tauri single-instance uses tauri.conf.json's identifier, transformed for D-Bus.
  # `own` is the highest D-Bus policy level and includes talking to the name;
  # do not also add `--talk-name` for the same key or Flatpak metadata records
  # only the lower `talk` policy.
  - --own-name=org.io_music_assistant_companion.SingleInstance

  # Flatpak-aware autostart writes a host XDG autostart launcher whose Exec uses
  # `flatpak run ...`; keep the permission scoped to that one config directory.
  - --filesystem=xdg-config/autostart:create

  # Discord Rich Presence connects to Discord's local IPC socket when enabled.
  - --filesystem=xdg-run/discord-ipc-0:ro
  - --filesystem=xdg-run/discord-ipc-1:ro
  - --filesystem=xdg-run/discord-ipc-2:ro
  - --filesystem=xdg-run/discord-ipc-3:ro
  - --filesystem=xdg-run/discord-ipc-4:ro
  - --filesystem=xdg-run/discord-ipc-5:ro
  - --filesystem=xdg-run/discord-ipc-6:ro
  - --filesystem=xdg-run/discord-ipc-7:ro
  - --filesystem=xdg-run/discord-ipc-8:ro
  - --filesystem=xdg-run/discord-ipc-9:ro
  # all of these locations are searched by the discord-rich-presence crate.
  - --filesystem=xdg-run/app/com.discordapp.Discord:ro
  - --filesystem=xdg-run/app/dev.vencord.Vesktop:ro
  - --filesystem=xdg-run/snap.discord:ro
  - --filesystem=xdg-run/snap.discord-canary:ro

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/*.la
  - /share/aclocal
  - /share/gtk-doc
  - /share/man

modules:
  - name: libappindicator
    build-options:
      cflags: -Wno-error
      make-args:
        - -j1
      env:
        GTKDOCIZE: "true"
    rm-configure: true
    config-opts:
      - --disable-static
      - --disable-gtk-doc
      - --disable-tests
      - --disable-mono-tests
      - --enable-introspection=no
      - --with-gtk=3
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/*.la
      - /share/gtk-doc
      - /share/gir-1.0
    sources:
      - type: archive
        url: https://launchpad.net/libappindicator/12.10/12.10.0/+download/libappindicator-12.10.0.tar.gz
        mirror-urls:
          - https://mirror.math.princeton.edu/pub/frugalware/frugalware-2.1/source/xlib-extra/libappindicator/libappindicator-12.10.0.tar.gz
          - https://distfiles.alpinelinux.org/distfiles/v3.12/libappindicator-12.10.0.tar.gz
          - https://ftp.fr.openbsd.org/pub/OpenBSD/distfiles/libappindicator-12.10.0.tar.gz
        sha256: d5907c1f98084acf28fd19593cb70672caa0ca1cf82d747ba6f4830d4cc3b49f
      - type: patch
        paths:
          - patches/libappindicator/0001-libappindicator-ftbfs.patch
          - patches/libappindicator/0002-libappindicator-no-python.patch
          - patches/libappindicator/0003-libappindicator-fix-crash-from-incorrect-signal-emission.patch
          - patches/libappindicator/0004-libappindicator-fix-crash-iterating-icon-themes.patch
      - type: script
        commands:
          - autoreconf -sfi
        dest-filename: autogen.sh
    modules:
      - name: intltool
        cleanup:
          - "*"
        sources:
          - type: archive
            url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
            mirror-urls:
              - https://sources.suse.com/SUSE:SLE-15-SP7:Update:BCI/000product/ca527df4d03bf96a67854a8ed2f0c64b/INCLUDED/SUSE:SLE-15-SP6:GA::intltool::45f77273c3f2ef792fa697b444183beb/intltool-0.51.0.tar.gz
              - https://mirror-hk.koddos.net/lfs/lfs-packages/12.0/intltool-0.51.0.tar.gz
              - https://gstreamer.freedesktop.org/src/mirror/intltool-0.51.0.tar.gz
            sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd
          - type: patch
            path: patches/intltool/intltool-perl5.26-regex-fixes.patch

      - name: dbus-glib
        config-opts:
          - --disable-static
          - --disable-gtk-doc
        cleanup:
          - "*.la"
          - /bin
          - /etc
          - /include
          - /lib/pkgconfig
          - /libexec
          - /share/gtk-doc
          - /share/man
        sources:
          - type: archive
            url: https://dbus.freedesktop.org/releases/dbus-glib/dbus-glib-0.114.tar.gz
            sha256: c09c5c085b2a0e391b8ee7d783a1d63fe444e96717cc1814d61b5e8fc2827a7c

      - name: libdbusmenu
        build-options:
          cflags: -Wno-error
          env:
            HAVE_VALGRIND_FALSE: "#"
            HAVE_VALGRIND_TRUE: ""
        cleanup:
          - /include
          - /libexec
          - /lib/pkgconfig
          - /lib/*.la
          - /share/doc
          - /share/libdbusmenu
          - /share/gtk-doc
          - /share/gir-1.0
        config-opts:
          - --disable-static
          - --disable-gtk-doc
          - --enable-introspection=no
          - --disable-vala
          - --disable-dumper
          - --disable-tests
          - --with-gtk=3
        sources:
          - type: archive
            url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
            mirror-urls:
              - https://sources.suse.com/SUSE:SLFO:Main:Build/libdbusmenu/a5b3e4717f09f90f9cd5568a5f933e8d/libdbusmenu-16.04.0.tar.gz
              - https://mirror.math.princeton.edu/pub/frugalware/frugalware-2.1/source/xlib/libdbusmenu/libdbusmenu-16.04.0.tar.gz
              - https://ftp.fr.openbsd.org/pub/OpenBSD/distfiles/libdbusmenu-16.04.0.tar.gz
            sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a

      - name: libindicator
        build-options:
          cflags: -Wno-error
        cleanup:
          - /include
          - /libexec
          - /lib/pkgconfig
          - /lib/*.la
          - /share/libindicator
          - /share/gtk-doc
          - /share/gir-1.0
        config-opts:
          - --disable-static
          - --disable-tests
          - --with-gtk=3
        sources:
          - type: archive
            url: https://launchpad.net/libindicator/12.10/12.10.1/+download/libindicator-12.10.1.tar.gz
            mirror-urls:
              - https://ftp.fr.openbsd.org/pub/OpenBSD/distfiles/libindicator-12.10.1.tar.gz
              - https://distfiles.alpinelinux.org/distfiles/v3.11/libindicator-12.10.1.tar.gz
            sha256: b2d2e44c10313d5c9cd60db455d520f80b36dc39562df079a3f29495e8f9447f
          - type: shell
            commands:
              - sed -e '/LIBINDICATOR_LIBS/ s/\$LIBM/ $LIBM/' -i configure.ac

  - name: music-assistant-companion
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/music-assistant-companion/cargo
        CARGO_NET_OFFLINE: "true"
        MUSIC_ASSISTANT_DISTRIBUTION: flatpak
    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - .github
          - build-dir
          - node_modules
          - packaging/flatpak/.flatpak-builder
          - packaging/flatpak/build-dir
          - packaging/flatpak/repo
          - packaging/flatpak/*.flatpak
          - src-tauri/target
          - target
      - cargo-sources.json
      - type: shell
        commands:
          - mkdir -p .cargo
          - cp -vf cargo/config .cargo/config.toml
    build-commands:
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml --verbose
      - cargo build --offline --release --manifest-path src-tauri/Cargo.toml --locked
      - install -Dm755 src-tauri/target/release/music-assistant /app/bin/music-assistant-companion
      - install -dm755 '/app/lib/Music Assistant/resources'
      - cp -r src-tauri/resources/. '/app/lib/Music Assistant/resources/'
      - install -Dm644 packaging/flatpak/io.music_assistant.Companion.desktop /app/share/applications/io.music_assistant.Companion.desktop
      - install -Dm644 packaging/flatpak/io.music_assistant.Companion.metainfo.xml /app/share/metainfo/io.music_assistant.Companion.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.music_assistant.Companion.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.music_assistant.Companion.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.music_assistant.Companion.png
