name: Test and Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "yarn"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Check Prettier formatting
        run: yarn lint:format

      - name: Check Rust formatting
        run: cd src-tauri && cargo fmt --check

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run Clippy
        run: cd src-tauri && cargo clippy --all-targets --all-features -- -D warnings

  build:
    needs: lint
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
    uses: ./.github/workflows/build-packages.yml
    with:
      upload_release_assets: false

  approve-fork-build:
    needs: lint
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    # Configure this environment in GitHub with required reviewers. This keeps
    # fork PR code on the safe `pull_request` event while allowing maintainers to
    # opt into the expensive full build matrix after reviewing the PR.
    runs-on: ubuntu-24.04
    environment: fork-pr-full-build
    steps:
      - name: Approved
        run: echo "Fork PR full build approved."

  build-fork-approved:
    needs: approve-fork-build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    permissions:
      contents: read
    uses: ./.github/workflows/build-packages.yml
    with:
      upload_release_assets: false
