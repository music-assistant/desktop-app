name: Build Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., 0.4.4)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    uses: ./.github/workflows/build-packages.yml
    with:
      tag: ${{ inputs.tag }}
      upload_release_assets: true
    secrets: inherit

  update-homebrew:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Trigger Homebrew tap update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            curl -X POST \
              -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/music-assistant/homebrew-tap/dispatches \
              -d "{\"event_type\": \"update-formula\", \"client_payload\": {\"version\": \"$RELEASE_TAG\"}}"
          else
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew tap update"
          fi
